name: Gallery contribution / Contribution à la galerie
description: Propose a voluntary example for the AI in Teaching Gallery.
title: "[Gallery contribution]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for proposing a contribution. Please do not include identifiable student data, confidential data, proprietary material, or sensitive information.

        Merci de proposer une contribution. N'incluez pas de données étudiantes identifiables, de données confidentielles, de matériel propriétaire ou d'information sensible.

  - type: dropdown
    id: language
    attributes:
      label: Language / Langue
      options:
        - English
        - Français
        - Bilingual / Bilingue
    validations:
      required: true

  - type: input
    id: contribution_title
    attributes:
      label: Title / Titre
      description: Short descriptive title. / Titre court et descriptif.
    validations:
      required: true

  - type: input
    id: contributor
    attributes:
      label: Contributor / Personne contributrice
      description: Name or group name, only if you want it shown. / Nom ou nom du groupe, seulement si vous voulez qu'il soit affiché.

  - type: dropdown
    id: category
    attributes:
      label: Category / Catégorie
      options:
        - Activity / Activité
        - Assessment / Évaluation
        - Personalized AI / IA personnalisée
        - Prompt / Consigne
        - Synthetic data / Données synthétiques
        - Other / Autre
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: The idea / L'idée
      description: What is the example? Include the course or teaching context if useful.
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: Why it helps / Ce que ça apporte
      description: Why would this be useful for teaching, learning, assessment, preparation, or reuse?
    validations:
      required: true

  - type: textarea
    id: adapt
    attributes:
      label: Adapt it / À réutiliser
      description: What could another instructor reuse, adapt, or try?
    validations:
      required: true

  - type: textarea
    id: material
    attributes:
      label: Material / Matériel
      description: Add a prompt, short text, link, file description, or note about what material should be shared.

  - type: textarea
    id: note
    attributes:
      label: Optional note / Note optionnelle
      description: Anything the facilitators should know before adding it to the public gallery?

  - type: dropdown
    id: consent
    attributes:
      label: Sharing consent / Consentement au partage
      options:
        - Share only during the workshop. / Partager seulement pendant l'atelier.
        - Share in the public gallery without my name. / Partager dans la galerie publique sans mon nom.
        - Share in the public gallery with my name. / Partager dans la galerie publique avec mon nom.
        - Do not share. / Ne pas partager.
    validations:
      required: true
